
<!DOCTYPE html>
<html>
<head>
    <title>PromptCraft Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://js.puter.com/v2/"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="app-logo">PromptCraft Pro</div>
            <nav>
                <div class="nav-item active" data-category="all">All Prompts</div>
                <div class="nav-item" data-category="coding">Coding</div>
                <div class="nav-item" data-category="writing">Writing</div>
                <div class="nav-item" data-category="analysis">Analysis</div>
                <div class="nav-item" data-category="creative">Creative</div>
                <div class="nav-item" data-category="business">Business</div>
                <div class="nav-item" data-category="academic">Academic</div>
            </nav>

            <!-- Advanced Filters Section (Phase 2) -->
            <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection('cameraFilters')">
                    <span>📷 Camera</span>
                    <span class="filter-section-toggle" id="cameraFiltersToggle">▼</span>
                </div>
                <div class="filter-section-content" id="cameraFilters">
                    <div class="filter-group">
                        <label class="filter-label">Angle</label>
                        <select id="filterAngle" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">Any Angle</option>
                            <option value="high-angle">High Angle</option>
                            <option value="low-angle">Low Angle</option>
                            <option value="eye-level">Eye Level</option>
                            <option value="bird-eye">Bird's Eye</option>
                            <option value="worm-eye">Worm's Eye</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Shot Type</label>
                        <select id="filterShotType" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">Any Shot Type</option>
                            <option value="close-up">Close-up</option>
                            <option value="medium">Medium Shot</option>
                            <option value="long">Long Shot</option>
                            <option value="extreme-close-up">Extreme Close-up</option>
                            <option value="full-body">Full Body</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Lens</label>
                        <select id="filterLens" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">Any Lens</option>
                            <option value="wide-angle">Wide Angle</option>
                            <option value="telephoto">Telephoto</option>
                            <option value="macro">Macro</option>
                            <option value="standard">Standard</option>
                            <option value="fisheye">Fisheye</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection('subjectFilters')">
                    <span>👤 Subject</span>
                    <span class="filter-section-toggle" id="subjectFiltersToggle">▼</span>
                </div>
                <div class="filter-section-content" id="subjectFilters">
                    <div class="filter-group">
                        <label class="filter-label">Pose</label>
                        <input type="text" id="filterPose" class="filter-input" placeholder="Any pose" oninput="applyAdvancedFilters()" />
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Orientation</label>
                        <select id="filterOrientation" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">Any Orientation</option>
                            <option value="facing-camera">Facing Camera</option>
                            <option value="profile">Profile</option>
                            <option value="three-quarter">Three Quarter</option>
                            <option value="back">Back View</option>
                            <option value="over-shoulder">Over Shoulder</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Framing</label>
                        <select id="filterFraming" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">Any Framing</option>
                            <option value="headshot">Headshot</option>
                            <option value="three-quarter">Three-Quarter</option>
                            <option value="full-body">Full Body</option>
                            <option value="cowboy">Cowboy Shot</option>
                            <option value="extreme-close-up">Extreme Close-up</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection('settingFilters')">
                    <span>🌍 Setting</span>
                    <span class="filter-section-toggle" id="settingFiltersToggle">▼</span>
                </div>
                <div class="filter-section-content" id="settingFilters">
                    <div class="filter-group">
                        <label class="filter-label">Location</label>
                        <input type="text" id="filterLocation" class="filter-input" placeholder="Any location" oninput="applyAdvancedFilters()" list="locationSuggestions" />
                        <datalist id="locationSuggestions"></datalist>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Lighting</label>
                        <select id="filterLighting" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">Any Lighting</option>
                            <option value="natural">Natural Light</option>
                            <option value="studio">Studio Light</option>
                            <option value="golden-hour">Golden Hour</option>
                            <option value="blue-hour">Blue Hour</option>
                            <option value="neon">Neon</option>
                            <option value="low-key">Low Key</option>
                            <option value="high-key">High Key</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Time</label>
                        <select id="filterTime" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">Any Time</option>
                            <option value="morning">Morning</option>
                            <option value="afternoon">Afternoon</option>
                            <option value="evening">Evening</option>
                            <option value="night">Night</option>
                            <option value="sunrise">Sunrise</option>
                            <option value="sunset">Sunset</option>
                        </select>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" class="search-box" placeholder="Search prompts..." id="searchInput" oninput="applyAdvancedFilters()">
                    <div class="filters">
                        <select id="filterType" class="filter-select" onchange="applyAdvancedFilters()">
                            <option value="">All Types</option>
                            <option value="image">📷 Image</option>
                            <option value="video">🎬 Video</option>
                            <option value="code">💻 Code</option>
                            <option value="uncategorized">❓ Uncategorized</option>
                        </select>
                        <div id="tagFilters" class="tag-filters"></div>
                    </div>
                </div>
                <div class="toolbar-right">
                    <span class="results-counter" id="resultsCounter">0 of 0 prompts</span>
                    <button class="btn btn-secondary btn-small" id="clearFiltersBtn" onclick="clearAllFilters()" style="display: none;">Clear All Filters</button>
                    <button class="btn btn-primary" onclick="showAddPromptModal()">New Prompt</button>
                </div>
            </div>
            <div class="prompts-grid" id="promptsGrid"></div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="promptModal">
        <div class="modal-content">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Create New Prompt</div>
                <button class="modal-close-btn" onclick="hidePromptModal()">✕</button>
            </div>

            <!-- Single Input Field: Prompt Content -->
            <div class="form-group">
                <label class="form-label">Prompt Content *</label>
                <textarea class="form-control" id="promptContent" rows="8" placeholder="Enter your prompt here..."></textarea>
            </div>

            <!-- Metadata Extraction Section (Auto-extracted) -->
            <div class="metadata-extraction" id="metadataExtraction" style="display: none;">
                <div class="extraction-header">
                    <span class="extraction-title">🤖 AI Metadata (Auto-extracted)</span>
                    <span id="confidenceIndicator" class="confidence-indicator">—</span>
                </div>
                
                <div class="confidence-bar">
                    <span id="reviewWarning" class="needs-review-badge" style="display: none;">⚠ Needs Review</span>
                </div>

                <div class="metadata-fields">
                    <div class="form-row">
                        <select id="metaType" class="form-control">
                            <option value="image">📷 Image</option>
                            <option value="video">🎬 Video</option>
                            <option value="code">💻 Code</option>
                            <option value="uncategorized">❓ Uncategorized</option>
                        </select>

                        <select id="metaSubtype" class="form-control">
                            <!-- Dynamically populated -->
                        </select>
                    </div>

                    <input type="text" class="form-control" id="metaTags" placeholder="Tags (comma-separated, max 8)" />

                    <details class="metadata-advanced">
                        <summary>Advanced Attributes</summary>
                        <div id="attributesContainer"></div>
                    </details>
                </div>

                <button class="btn btn-secondary" onclick="clearMetadata()">Clear Metadata</button>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hidePromptModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePrompt()">Save Prompt</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>


    <!-- FAB (mobile only) -->
    <button class="fab" onclick="showAddPromptModal()" aria-label="New Prompt">+</button>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav" id="mobileNav">
        <div class="mobile-nav-item active" data-type="" onclick="setMobileFilter(this, '')">
            <span class="mobile-nav-icon">🏠</span>
            <span class="mobile-nav-label">All</span>
        </div>
        <div class="mobile-nav-item" data-type="image" onclick="setMobileFilter(this, 'image')">
            <span class="mobile-nav-icon">📷</span>
            <span class="mobile-nav-label">Image</span>
        </div>
        <div class="mobile-nav-item" data-type="video" onclick="setMobileFilter(this, 'video')">
            <span class="mobile-nav-icon">🎬</span>
            <span class="mobile-nav-label">Video</span>
        </div>
        <div class="mobile-nav-item" data-type="code" onclick="setMobileFilter(this, 'code')">
            <span class="mobile-nav-icon">💻</span>
            <span class="mobile-nav-label">Code</span>
        </div>
        <div class="mobile-nav-item" data-type="uncategorized" onclick="setMobileFilter(this, 'uncategorized')">
            <span class="mobile-nav-icon">❓</span>
            <span class="mobile-nav-label">Other</span>
        </div>
    </nav>

    <script>
        function setMobileFilter(el, type) {
            document.getElementById('filterType').value = type;
            document.querySelectorAll('.mobile-nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            if (typeof applyFilters === 'function') applyFilters();
        }
    </script>

    <script src="main.js"></script>
</body>
</html>
