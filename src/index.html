<!DOCTYPE html>
<html>
<head>
    <title>PromptCraft Pro</title>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="app-logo">PromptCraft Pro</div>
            <nav>
                <div class="nav-item active" data-category="all">All Prompts</div>
                <div class="nav-item" data-category="coding">Coding</div>
                <div class="nav-item" data-category="writing">Writing</div>
                <div class="nav-item" data-category="analysis">Analysis</div>
                <div class="nav-item" data-category="creative">Creative</div>
                <div class="nav-item" data-category="business">Business</div>
                <div class="nav-item" data-category="academic">Academic</div>
            </nav>
        </aside>

        <main class="main">
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" class="search-box" placeholder="Search prompts..." id="searchInput">
                    <div class="filters">
                        <select id="filterType" class="filter-select">
                            <option value="">All Types</option>
                            <option value="image">📷 Image</option>
                            <option value="video">🎬 Video</option>
                            <option value="code">💻 Code</option>
                            <option value="uncategorized">❓ Uncategorized</option>
                        </select>
                        <div id="tagFilters" class="tag-filters"></div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="showAddPromptModal()">New Prompt</button>
            </div>
            <div class="prompts-grid" id="promptsGrid"></div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="promptModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Create New Prompt</div>
            </div>

            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" id="promptTitle" placeholder="Enter prompt title">
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="promptDescription" rows="2" placeholder="Enter brief description"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Prompt Content</label>
                <textarea class="form-control" id="promptContent" rows="5" placeholder="Enter your prompt"></textarea>
            </div>

            <!-- Metadata Extraction Section (Task 1.6) -->
            <div class="metadata-extraction" id="metadataExtraction">
                <div class="extraction-header">
                    <span class="extraction-title">🤖 AI Metadata</span>
                    <button class="btn btn-secondary btn-small" onclick="extractMetadata()">Extract Metadata</button>
                </div>

                <div class="confidence-bar">
                    <span id="confidenceIndicator" class="confidence-indicator">—</span>
                    <span id="reviewWarning" class="needs-review-badge" style="display: none;">⚠ Needs Review</span>
                </div>

                <div class="metadata-fields">
                    <div class="form-row">
                        <select id="metaType" class="form-control">
                            <option value="image">📷 Image</option>
                            <option value="video">🎬 Video</option>
                            <option value="code">💻 Code</option>
                            <option value="uncategorized">❓ Uncategorized</option>
                        </select>

                        <select id="metaSubtype" class="form-control">
                            <!-- Dynamically populated based on type -->
                        </select>
                    </div>

                    <input type="text" class="form-control" id="metaTags" placeholder="Tags (comma-separated, max 8)" />

                    <details class="metadata-advanced">
                        <summary>Advanced Attributes</summary>
                        <div id="attributesContainer">
                            <p style="color: var(--text-secondary); font-size: 0.875rem;">No attributes extracted</p>
                        </div>
                    </details>
                </div>

                <button class="btn btn-secondary" onclick="clearMetadata()">Clear Metadata</button>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hidePromptModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePrompt()">Save Prompt</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>


    <script src="main.js"></script>
</body>
</html>
